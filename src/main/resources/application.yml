spring:
  application:
    name: ${APP_NAME:SEMS}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sems_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework: info

app:
  mail:
    from: ${MAIL_FROM:}
  seed:
    enabled: ${SEED_DATA_ENABLED:true}
    default-password: ${SEED_DEFAULT_PASSWORD:Password@123}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
    otp:
      expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
      length: ${OTP_LENGTH:6}
    lockout:
      max-failed-attempts: ${LOCKOUT_MAX_FAILED_ATTEMPTS:5}
      duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}
    rate-limit:
      login:
        max-requests: ${LOGIN_RATE_LIMIT_MAX_REQUESTS:5}
        window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
